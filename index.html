<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hunter Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .glass-card { 
            background: linear-gradient(145deg, #0f172a, #1e293b); 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        input { 
            background: #1e293b !important; 
            color: white !important; 
            border: 1px solid #334155 !important; 
            outline: none !important;
        }
        input:focus {
            border-color: #3b82f6 !important;
        }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="pb-40">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-10 pt-4">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">Hunter<span class="text-blue-500">.Log</span></h1>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-1">Твои подписки под контролем</p>
            </div>
            <button onclick="toggleArchive()" id="archive-btn" class="bg-slate-900 border border-slate-800 px-5 py-2.5 rounded-2xl active:scale-95 transition-all text-[10px] font-black text-slate-400 uppercase tracking-widest">Архив</button>
        </header>

        <div id="list" class="space-y-4"></div>
    </div>

    <!-- Bottom Action Area -->
    <div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-slate-950 via-slate-950/90 to-transparent safe-area-bottom">
        <button onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[2.2rem] shadow-2xl shadow-blue-900/40 font-black text-white text-lg active:scale-95 transition-all flex items-center justify-center gap-3">
            <span class="text-2xl">＋</span> ДОБАВИТЬ ЛОТ
        </button>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-950/98 backdrop-blur-2xl hidden z-[100] items-center justify-center p-6">
        <div class="bg-slate-900 w-full max-w-sm p-8 rounded-[3.5rem] border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-black text-white tracking-tight italic mb-8 uppercase text-center">Новый Конкурс</h2>
            
            <div class="space-y-4">
                <input type="text" id="n" placeholder="Название канала" class="w-full p-4.5 rounded-2xl font-bold text-white placeholder-slate-600">
                <input type="text" id="p" placeholder="Какой приз?" class="w-full p-4.5 rounded-2xl text-white placeholder-slate-600">
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="date" id="d" class="p-4 rounded-2xl text-xs w-full text-slate-400">
                    <input type="time" id="t" class="p-4 rounded-2xl text-xs w-full text-slate-400">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <span class="absolute top-2 left-4 text-[7px] font-black text-slate-500 uppercase">Побед</span>
                        <input type="number" id="w" value="1" class="p-5 pt-7 rounded-2xl text-xs w-full">
                    </div>
                    <div class="relative">
                        <span class="absolute top-2 left-4 text-[7px] font-black text-slate-500 uppercase">Участников</span>
                        <input type="number" id="u" placeholder="0" class="p-5 pt-7 rounded-2xl text-xs w-full">
                    </div>
                </div>

                <div class="flex gap-4 mt-8">
                    <button onclick="closeModal()" class="flex-1 font-black text-slate-600 text-xs uppercase tracking-widest">Назад</button>
                    <button onclick="save()" class="flex-[2] bg-blue-600 text-white py-5 rounded-[1.8rem] font-black active:scale-95 transition-all shadow-xl shadow-blue-900/30 uppercase">Создать</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let db = JSON.parse(localStorage.getItem('h_elite_db') || '[]');
        let archive = false;

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('d').valueAsDate = new Date();
            document.getElementById('t').value = '18:00';
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function save() {
            const name = document.getElementById('n').value;
            const prize = document.getElementById('p').value;
            if(!name || !prize) return;

            db.push({
                id: Date.now(),
                name, prize,
                date: document.getElementById('d').value,
                time: document.getElementById('t').value,
                winners: parseInt(document.getElementById('w').value) || 1,
                users: parseInt(document.getElementById('u').value) || 0,
                done: false
            });

            localStorage.setItem('h_elite_db', JSON.stringify(db));
            closeModal();
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            render();
            // Clear inputs
            document.getElementById('n').value = '';
            document.getElementById('p').value = '';
        }

        function toggle(id) {
            const i = db.findIndex(x => x.id === id);
            db[i].done = !db[i].done;
            localStorage.setItem('h_elite_db', JSON.stringify(db));
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            render();
        }

        function toggleArchive() { 
            archive = !archive; 
            document.getElementById('archive-btn').innerText = archive ? 'АКТИВНЫЕ' : 'АРХИВ';
            render(); 
        }

        function render() {
            const container = document.getElementById('list');
            container.innerHTML = '';
            const filtered = db.filter(x => x.done === archive);

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-800 font-black uppercase text-[10px] tracking-[0.3em]">Пусто</div>`;
                return;
            }

            filtered.sort((a,b) => b.id - a.id).forEach(item => {
                const chance = item.users > 0 ? ((item.winners / item.users) * 100).toFixed(1) : '0.0';
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-[2.5rem] flex justify-between items-center transition-all ${item.done ? 'opacity-30' : 'active:scale-[0.97]'}`;
                card.innerHTML = `
                    <div class="flex-1" onclick="toggle(${item.id})">
                        <p class="text-[8px] font-bold text-slate-500 mb-1 uppercase">${item.date} • ${item.time}</p>
                        <h3 class="text-white font-black text-xl uppercase tracking-tight truncate max-w-[200px]">${item.name}</h3>
                        <p class="text-blue-500 font-bold text-[10px] mt-1 uppercase tracking-widest">🎁 ${item.prize} • ШАНС ${chance}%</p>
                    </div>
                    <button onclick="if(confirm('Удалить?')){db=db.filter(x=>x.id!==${item.id});localStorage.setItem('h_elite_db',JSON.stringify(db));render();}" class="text-slate-800 text-3xl pl-4">&times;</button>
                `;
                container.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
