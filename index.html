<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Hunter AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid rgba(255,255,255,0.05); }
        input { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; border-radius: 1rem !important; }
        .loading-shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black italic text-white uppercase">Hunter<span class="text-blue-500">.AI</span></h1>
            <button onclick="toggleArchive()" id="archive-btn" class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl text-[10px] font-bold text-slate-400">АРХИВ</button>
        </header>
        <div id="contest-container" class="space-y-4"></div>
    </div>

    <div class="fixed bottom-8 left-0 right-0 px-8">
        <button onclick="openModal()" class="w-full bg-blue-600 py-5 rounded-[2rem] shadow-xl font-black text-white text-lg active:scale-95 transition-all">＋ НОВЫЙ ЛОТ</button>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/98 hidden z-[100] items-center justify-center p-6">
        <div class="bg-slate-900 w-full max-w-sm p-8 rounded-[3rem] border border-white/10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-white uppercase tracking-tighter">Настройка</h2>
                <label class="bg-orange-600 px-4 py-2 rounded-xl text-[10px] font-bold text-white cursor-pointer active:scale-90 transition-all">
                    СКАН 📸
                    <input type="file" id="file-picker" accept="image/*" class="hidden" onchange="analyzeImage(this)">
                </label>
            </div>
            
            <div id="ai-loading-indicator" class="hidden w-full h-1 rounded-full loading-shimmer mb-6"></div>

            <div class="space-y-4">
                <input type="text" id="in-name" placeholder="Название канала" class="w-full p-4 outline-none">
                <input type="text" id="in-prize" placeholder="Приз" class="w-full p-4 outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input type="date" id="in-date" class="p-4 text-xs outline-none w-full">
                    <input type="time" id="in-time" class="p-4 text-xs outline-none w-full">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="in-winners" placeholder="Побед" class="p-4 text-xs outline-none w-full">
                    <input type="number" id="in-users" placeholder="Участников" class="p-4 text-xs outline-none w-full">
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal()" class="flex-1 font-bold text-slate-500">Отмена</button>
                    <button onclick="save()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black uppercase">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAkWRYL9_tpgC60nMQvM8mQQD81MIIwG2k';
        const tg = window.Telegram.WebApp;
        tg.ready();

        let contests = JSON.parse(localStorage.getItem('h_v5') || '[]');
        let archiveMode = false;

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('in-date').valueAsDate = new Date();
            document.getElementById('in-time').value = '18:00';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function analyzeImage(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('ai-loading-indicator').classList.remove('hidden');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                
                const prompt = "Analyze TG screenshot. Extract: 1.Channel Name (top text), 2.Prize (main noun), 3.Participants (number in brackets like 'Участвовать (123)'), 4.Date, 5.Winners count. Return ONLY JSON: {\"channel\":\"...\",\"prize\":\"...\",\"date\":\"YYYY-MM-DD\",\"time\":\"HH:MM\",\"winners\":1,\"users\":100}";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: base64 } }] }]
                        })
                    });

                    const res = await response.json();
                    let raw = res.candidates[0].content.parts[0].text;
                    // Чистка JSON от мусора
                    let clean = raw.substring(raw.indexOf('{'), raw.lastIndexOf('}') + 1);
                    const data = JSON.parse(clean);

                    if(data.channel) document.getElementById('in-name').value = data.channel;
                    if(data.prize) document.getElementById('in-prize').value = data.prize;
                    if(data.winners) document.getElementById('in-winners').value = data.winners;
                    if(data.users) document.getElementById('in-users').value = data.users;
                    if(data.date) document.getElementById('in-date').value = data.date;
                    if(data.time) document.getElementById('in-time').value = data.time;

                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } catch (err) {
                    console.error(err);
                    tg.showAlert('ИИ не смог прочитать. Попробуй еще раз или проверь VPN.');
                } finally {
                    document.getElementById('ai-loading-indicator').classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        function save() {
            const n = document.getElementById('in-name').value;
            const p = document.getElementById('in-prize').value;
            const d = document.getElementById('in-date').value;
            const t = document.getElementById('in-time').value;
            if(!n || !p) return;
            contests.push({
                id: Date.now(), name: n, prize: p, date: d, time: t,
                winners: parseInt(document.getElementById('in-winners').value) || 1,
                users: parseInt(document.getElementById('in-users').value) || 1,
                done: false, ts: new Date(`${d}T${t}`).getTime()
            });
            localStorage.setItem('h_v5', JSON.stringify(contests));
            closeModal();
            render();
        }

        function toggleStatus(id) {
            const i = contests.findIndex(x => x.id === id);
            contests[i].done = !contests[i].done;
            localStorage.setItem('h_v5', JSON.stringify(contests));
            render();
        }

        function toggleArchive() {
            archiveMode = !archiveMode;
            document.getElementById('archive-btn').innerText = archiveMode ? 'АКТИВНЫЕ' : 'АРХИВ';
            render();
        }

        function render() {
            const container = document.getElementById('contest-container');
            container.innerHTML = '';
            const list = contests.filter(c => c.done === archiveMode);
            list.sort((a,b) => a.ts - b.ts).forEach(item => {
                const chance = ((item.winners / item.users) * 100).toFixed(1);
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-[2rem] flex justify-between items-center ${item.done ? 'opacity-40' : ''}`;
                card.innerHTML = `
                    <div class="flex-1" onclick="toggleStatus(${item.id})">
                        <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">${item.date} | ${item.time}</p>
                        <h3 class="text-white font-black text-lg uppercase tracking-tight">${item.name}</h3>
                        <p class="text-blue-500 font-bold text-[10px] mt-1 uppercase">🎁 ${item.prize} • ШАНС ${chance}%</p>
                    </div>
                    <button onclick="if(confirm('Удалить?')){contests=contests.filter(x=>x.id!==${item.id});localStorage.setItem('h_v5',JSON.stringify(contests));render();}" class="text-slate-800 text-3xl ml-4">&times;</button>
                `;
                container.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
