<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Hunter Universal AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid rgba(255,255,255,0.05); }
        .hot-glow { animation: glow 2s infinite alternate; border-color: rgba(239, 68, 68, 0.5); }
        @keyframes glow { from { box-shadow: 0 0 10px -5px #ef4444; } to { box-shadow: 0 0 20px 2px #ef4444; } }
        input { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; border-radius: 1rem !important; }
        .loading-shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32 overflow-x-hidden">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-10 pt-4">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">Hunter<span class="text-blue-500 italic">.AI</span></h1>
                <p id="status-text" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-1">Универсальный сканер</p>
            </div>
            <button onclick="toggleArchive()" class="bg-slate-900/50 border border-slate-800 px-4 py-2 rounded-2xl active:scale-95 transition-all text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Архив</button>
        </header>

        <div id="contest-container" class="space-y-4 min-h-[300px]"></div>
    </div>

    <div class="fixed bottom-8 left-0 right-0 px-8 z-50">
        <button onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[2.2rem] shadow-2xl shadow-blue-900/50 font-black text-white text-lg active:scale-95 transition-all flex items-center justify-center gap-3">
            <span class="text-2xl">＋</span> ДОБАВИТЬ ЛОТ
        </button>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl hidden z-[100] items-center justify-center p-6">
        <div id="modal-box" class="bg-slate-900 w-full max-w-sm p-8 rounded-[3.5rem] border border-white/10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-white tracking-tight">Новый конкурс</h2>
                <label class="bg-orange-500 px-4 py-2 rounded-xl text-[10px] font-black text-white cursor-pointer active:scale-90 transition-all flex items-center gap-2">
                    Скан 📸
                    <input type="file" id="file-picker" accept="image/*" class="hidden" onchange="analyzeImage(this)">
                </label>
            </div>
            
            <div id="ai-loading-indicator" class="hidden w-full h-1 rounded-full loading-shimmer mb-6"></div>

            <div class="space-y-3">
                <input type="text" id="in-name" placeholder="Название канала" class="w-full p-4 outline-none">
                <input type="text" id="in-prize" placeholder="Что разыгрывают?" class="w-full p-4 outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] text-slate-500 ml-2 uppercase font-bold">Дата итогов</label>
                        <input type="date" id="in-date" class="p-4 text-xs outline-none w-full">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] text-slate-500 ml-2 uppercase font-bold">Время</label>
                        <input type="time" id="in-time" class="p-4 text-xs outline-none w-full">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="in-winners" placeholder="Победителей" class="p-4 text-xs outline-none w-full">
                    <input type="number" id="in-users" placeholder="Участников" class="p-4 text-xs outline-none w-full">
                </div>

                <div class="flex gap-4 mt-6">
                    <button onclick="closeModal()" class="flex-1 font-bold text-slate-500 text-sm">Отмена</button>
                    <button onclick="save()" class="flex-[2] bg-blue-600 text-white py-5 rounded-[1.5rem] font-black active:scale-95 transition-all">СОХРАНИТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAkWRYL9_tpgC60nMQvM8mQQD81MIIwG2k';
        const tg = window.Telegram.WebApp;
        tg.ready();

        let contests = JSON.parse(localStorage.getItem('hunter_v3_universal') || '[]');
        let archiveMode = false;

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('in-date').valueAsDate = new Date();
            document.getElementById('in-time').value = '18:00';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function analyzeImage(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('ai-loading-indicator').classList.remove('hidden');
            document.getElementById('status-text').innerText = 'ИИ изучает скриншот...';

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                
                const prompt = "Ты — универсальный парсер Telegram розыгрышей. Проанализируй скриншот любого канала и найди:\n" +
                               "1. Название канала (обычно в самом верху страницы).\n" +
                               "2. Приз (краткое название предмета или услуги).\n" +
                               "3. Количество победителей (ищи цифру рядом со словами 'победителей' или 'winners').\n" +
                               "4. Количество участников (ищи число на кнопке 'Участвовать' или в конце поста).\n" +
                               "5. Дату и время итогов.\n\n" +
                               "Верни ТОЛЬКО чистый JSON: { 'channel': '...', 'prize': '...', 'date': 'YYYY-MM-DD', 'time': 'HH:MM', 'winners': 1, 'users': 100 }.\n" +
                               "Год используй текущий.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: base64 } }] }]
                        })
                    });

                    const res = await response.json();
                    const text = res.candidates[0].content.parts[0].text;
                    const json = JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());

                    if(json.channel) document.getElementById('in-name').value = json.channel;
                    if(json.prize) document.getElementById('in-prize').value = json.prize;
                    if(json.date) document.getElementById('in-date').value = json.date;
                    if(json.time) document.getElementById('in-time').value = json.time;
                    if(json.winners) document.getElementById('in-winners').value = json.winners;
                    if(json.users) document.getElementById('in-users').value = json.users;

                    document.getElementById('status-text').innerText = 'Готово! Проверь данные.';
                } catch (err) {
                    document.getElementById('status-text').innerText = 'Ошибка. Попробуй еще раз.';
                } finally {
                    document.getElementById('ai-loading-indicator').classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        function save() {
            const data = {
                id: Date.now(),
                name: document.getElementById('in-name').value,
                prize: document.getElementById('in-prize').value,
                date: document.getElementById('in-date').value,
                time: document.getElementById('in-time').value,
                winners: parseInt(document.getElementById('in-winners').value) || 1,
                users: parseInt(document.getElementById('in-users').value) || 1,
                done: false,
                ts: new Date(`${document.getElementById('in-date').value}T${document.getElementById('in-time').value}`).getTime()
            };

            if(!data.name || !data.prize) return;
            contests.push(data);
            localStorage.setItem('hunter_v3_universal', JSON.stringify(contests));
            closeModal();
            render();
        }

        function toggleStatus(id) {
            const idx = contests.findIndex(x => x.id === id);
            contests[idx].done = !contests[idx].done;
            localStorage.setItem('hunter_v3_universal', JSON.stringify(contests));
            render();
        }

        function toggleArchive() { archiveMode = !archiveMode; render(); }

        function render() {
            const container = document.getElementById('contest-container');
            container.innerHTML = '';
            const list = contests.filter(c => c.done === archiveMode);
            const now = Date.now();

            list.sort((a,b) => a.ts - b.ts).forEach(item => {
                const isHot = !item.done && (item.ts - now) > 0 && (item.ts - now) < 3600000;
                const chance = ((item.winners / item.users) * 100).toFixed(1);
                
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-[2.5rem] flex justify-between items-center ${isHot ? 'hot-glow' : ''} ${item.done ? 'opacity-30' : ''}`;
                card.innerHTML = `
                    <div class="flex-1" onclick="toggleStatus(${item.id})">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-[8px] font-black bg-white/10 text-slate-400 px-3 py-1 rounded-full">
                                ${new Date(item.date).toLocaleDateString('ru-RU', {day:'numeric', month:'short'})} | ${item.time}
                            </span>
                        </div>
                        <h3 class="text-white font-black text-lg leading-tight">${item.name}</h3>
                        <p class="text-blue-500 font-bold text-[10px] mt-1">🎁 ${item.prize} • Шанс ${chance}%</p>
                    </div>
                    <button onclick="if(confirm('Удалить?')){contests=contests.filter(x=>x.id!==${item.id});localStorage.setItem('hunter_v3_universal',JSON.stringify(contests));render();}" class="text-slate-800 p-2 text-2xl">&times;</button>
                `;
                container.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
