<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Hunter AI Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid rgba(255,255,255,0.05); }
        .hot-glow { animation: glow 2s infinite alternate; border-color: rgba(239, 68, 68, 0.5); }
        @keyframes glow { from { box-shadow: 0 0 15px -5px #ef4444; } to { box-shadow: 0 0 25px 5px #ef4444; } }
        input { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; border-radius: 1.2rem !important; }
        .loading-shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32 overflow-x-hidden">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-8 pt-4">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">Hunter<span class="text-blue-500 italic">.AI</span></h1>
                <p id="status-text" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-1">Сканер активен</p>
            </div>
            <button onclick="toggleArchive()" id="archive-btn" class="bg-slate-900/50 border border-slate-800 px-4 py-2 rounded-2xl active:scale-95 transition-all text-[10px] font-black text-slate-400 uppercase tracking-widest">Архив</button>
        </header>

        <div id="contest-container" class="space-y-4 min-h-[300px]"></div>
    </div>

    <!-- Кнопка добавления -->
    <div class="fixed bottom-8 left-0 right-0 px-8 z-50">
        <button onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[2.2rem] shadow-2xl shadow-blue-900/50 font-black text-white text-lg active:scale-95 transition-all flex items-center justify-center gap-3">
            <span class="text-2xl">＋</span> НОВЫЙ КОНКУРС
        </button>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="fixed inset-0 bg-slate-950/98 backdrop-blur-3xl hidden z-[100] items-center justify-center p-6">
        <div id="modal-box" class="bg-slate-900 w-full max-w-sm p-8 rounded-[3.5rem] border border-white/10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black text-white tracking-tight italic">Настройка</h2>
                <label class="bg-orange-500 px-5 py-2.5 rounded-2xl text-[11px] font-black text-white cursor-pointer active:scale-90 transition-all flex items-center gap-2 shadow-lg shadow-orange-900/20">
                    СКАН 📸
                    <input type="file" id="file-picker" accept="image/*" class="hidden" onchange="analyzeImage(this)">
                </label>
            </div>
            
            <div id="ai-loading-indicator" class="hidden w-full h-1.5 rounded-full loading-shimmer mb-6"></div>

            <div class="space-y-4">
                <input type="text" id="in-name" placeholder="Название канала" class="w-full p-4.5 outline-none font-bold text-white">
                <input type="text" id="in-prize" placeholder="Приз (что дарят?)" class="w-full p-4.5 outline-none text-white">
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] text-slate-500 ml-3 uppercase font-black">Дата</label>
                        <input type="date" id="in-date" class="p-4 text-xs outline-none w-full">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] text-slate-500 ml-3 uppercase font-black">Время</label>
                        <input type="time" id="in-time" class="p-4 text-xs outline-none w-full">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] text-slate-500 ml-3 uppercase font-black">Победителей</label>
                        <input type="number" id="in-winners" value="1" class="p-4 text-xs outline-none w-full">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] text-slate-500 ml-3 uppercase font-black">Участников</label>
                        <input type="number" id="in-users" placeholder="0" class="p-4 text-xs outline-none w-full">
                    </div>
                </div>

                <div class="flex gap-4 mt-8">
                    <button onclick="closeModal()" class="flex-1 font-black text-slate-600 text-sm uppercase">Назад</button>
                    <button onclick="save()" class="flex-[2] bg-blue-600 text-white py-5 rounded-[1.8rem] font-black active:scale-95 transition-all shadow-xl shadow-blue-900/30">ДОБАВИТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAkWRYL9_tpgC60nMQvM8mQQD81MIIwG2k';
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let contests = JSON.parse(localStorage.getItem('hunter_v4_storage') || '[]');
        let archiveMode = false;

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('in-date').valueAsDate = new Date();
            document.getElementById('in-time').value = '18:00';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function analyzeImage(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('ai-loading-indicator').classList.remove('hidden');
            document.getElementById('status-text').innerText = 'Анализирую скриншот...';
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                
                // Улучшенный промпт для распознавания ЛЮБОГО скриншота
                const prompt = `Ты — эксперт по анализу Telegram. Твоя задача вытянуть данные из скриншота:
                1. Название канала: это самый верхний текст на экране, обычно над кнопкой "назад" или в самом центре сверху.
                2. Приз: самое заметное существительное в тексте поста (например: Рюкзаки, Скин, Деньги, Подписка).
                3. Участники: ищи число внутри скобок на кнопке "Участвовать (123)" или под постом.
                4. Победители: ищи фразу "X победителей" или "X winners".
                5. Дата/Время: найди дату окончания.
                Ответ дай СТРОГО в JSON формате: {"channel":"имя","prize":"что","winners":1,"users":100,"date":"YYYY-MM-DD","time":"HH:MM"}.
                Если чего-то не нашел, используй логичные заглушки. Год: ${new Date().getFullYear()}.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: base64 } }] }]
                        })
                    });

                    const res = await response.json();
                    const rawText = res.candidates[0].content.parts[0].text;
                    const cleanJson = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const data = JSON.parse(cleanJson);

                    if(data.channel) document.getElementById('in-name').value = data.channel;
                    if(data.prize) document.getElementById('in-prize').value = data.prize;
                    if(data.winners) document.getElementById('in-winners').value = data.winners;
                    if(data.users) document.getElementById('in-users').value = data.users;
                    if(data.date) document.getElementById('in-date').value = data.date;
                    if(data.time) document.getElementById('in-time').value = data.time;

                    document.getElementById('status-text').innerText = 'Скриншот прочитан!';
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } catch (err) {
                    console.error(err);
                    document.getElementById('status-text').innerText = 'Ошибка сканера';
                } finally {
                    document.getElementById('ai-loading-indicator').classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        function save() {
            const name = document.getElementById('in-name').value;
            const prize = document.getElementById('in-prize').value;
            const date = document.getElementById('in-date').value;
            const time = document.getElementById('in-time').value;
            const winners = parseInt(document.getElementById('in-winners').value) || 1;
            const users = parseInt(document.getElementById('in-users').value) || 1;

            if(!name || !prize) return;

            contests.push({
                id: Date.now(), name, prize, date, time, winners, users,
                done: false, ts: new Date(`${date}T${time}`).getTime()
            });

            localStorage.setItem('hunter_v4_storage', JSON.stringify(contests));
            closeModal();
            render();
        }

        function toggleStatus(id) {
            const idx = contests.findIndex(x => x.id === id);
            contests[idx].done = !contests[idx].done;
            localStorage.setItem('hunter_v4_storage', JSON.stringify(contests));
            render();
        }

        function toggleArchive() { 
            archiveMode = !archiveMode; 
            document.getElementById('archive-btn').innerText = archiveMode ? 'Активные' : 'Архив';
            render(); 
        }

        function render() {
            const container = document.getElementById('contest-container');
            container.innerHTML = '';
            const list = contests.filter(c => c.done === archiveMode);
            const now = Date.now();

            list.sort((a,b) => a.ts - b.ts).forEach(item => {
                const isHot = !item.done && (item.ts - now) > 0 && (item.ts - now) < 3600000;
                const chance = ((item.winners / item.users) * 100).toFixed(1);
                
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-[2.5rem] flex justify-between items-center transition-all ${isHot ? 'hot-glow' : ''} ${item.done ? 'opacity-30' : ''}`;
                card.innerHTML = `
                    <div class="flex-1" onclick="toggleStatus(${item.id})">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-[9px] font-black bg-white/10 text-slate-400 px-3 py-1 rounded-full">
                                ${new Date(item.date).toLocaleDateString('ru-RU', {day:'numeric', month:'short'})} | ${item.time}
                            </span>
                            ${isHot ? '<span class="text-[9px] font-black text-red-500 animate-pulse uppercase">Скоро итоги!</span>' : ''}
                        </div>
                        <h3 class="text-white font-black text-xl tracking-tight leading-tight uppercase">${item.name}</h3>
                        <p class="text-blue-500 font-bold text-[11px] mt-1 uppercase tracking-wider">🎁 ${item.prize} • Шанс ${chance}%</p>
                    </div>
                    <button onclick="if(confirm('Удалить?')){contests=contests.filter(x=>x.id!==${item.id});localStorage.setItem('hunter_v4_storage',JSON.stringify(contests));render();}" class="text-slate-800 p-2 text-2xl hover:text-red-500 transition-colors">&times;</button>
                `;
                container.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
