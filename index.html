<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Hunter AI Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid rgba(255,255,255,0.05); }
        .hot-glow { animation: glow 2s infinite alternate; border-color: rgba(239, 68, 68, 0.5); }
        @keyframes glow { from { box-shadow: 0 0 10px -5px #ef4444; } to { box-shadow: 0 0 20px 2px #ef4444; } }
        input { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; border-radius: 1rem !important; }
        .loading-shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32 overflow-x-hidden">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-10 pt-4">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">Hunter<span class="text-blue-500 italic">.AI</span></h1>
                <p id="status-text" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-1">Система готова</p>
            </div>
            <button onclick="toggleArchive()" class="bg-slate-900/50 border border-slate-800 px-4 py-2 rounded-2xl active:scale-95 transition-all text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Архив</button>
        </header>

        <div id="stats" class="grid grid-cols-2 gap-4 mb-10">
            <div class="glass-card p-6 rounded-[2.5rem] text-center">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1 tracking-widest">Твой шанс</p>
                <p id="avg-chance" class="text-3xl font-black text-white">0%</p>
            </div>
            <div class="glass-card p-6 rounded-[2.5rem] text-center">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1 tracking-widest">Горят</p>
                <p id="burning-count" class="text-3xl font-black text-red-500">0</p>
            </div>
        </div>

        <div id="contest-container" class="space-y-4 min-h-[300px]"></div>
    </div>

    <div class="fixed bottom-8 left-0 right-0 px-8 z-50">
        <button onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[2.2rem] shadow-2xl shadow-blue-900/50 font-black text-white text-lg active:scale-95 transition-all flex items-center justify-center gap-3">
            <span class="text-2xl">＋</span> НОВЫЙ ЛОТ
        </button>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl hidden z-[100] items-center justify-center p-6">
        <div id="modal-box" class="bg-slate-900 w-full max-w-sm p-8 rounded-[3.5rem] border border-white/10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black text-white tracking-tight">Добавление</h2>
                <label class="bg-orange-500 px-4 py-2 rounded-xl text-[10px] font-black text-white cursor-pointer active:scale-90 transition-all flex items-center gap-2">
                    Скан 📸
                    <input type="file" id="file-picker" accept="image/*" class="hidden" onchange="analyzeImage(this)">
                </label>
            </div>
            
            <div id="ai-loading-indicator" class="hidden w-full h-1 rounded-full loading-shimmer mb-6"></div>

            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-500 ml-3 uppercase">Название / Канал</label>
                    <input type="text" id="in-name" class="w-full p-4 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-500 ml-3 uppercase">Приз</label>
                    <input type="text" id="in-prize" class="w-full p-4 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-3 uppercase">Дата</label>
                        <input type="date" id="in-date" class="p-4 text-xs outline-none w-full">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-3 uppercase">Время</label>
                        <input type="time" id="in-time" class="p-4 text-xs outline-none w-full">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-3 uppercase">Побед</label>
                        <input type="number" id="in-winners" class="p-4 text-xs outline-none w-full">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-3 uppercase">Участников</label>
                        <input type="number" id="in-users" class="p-4 text-xs outline-none w-full">
                    </div>
                </div>

                <div class="flex gap-4 mt-8">
                    <button onclick="closeModal()" class="flex-1 font-bold text-slate-500 text-sm">Отмена</button>
                    <button onclick="save()" class="flex-[2] bg-blue-600 text-white py-5 rounded-[1.5rem] font-black active:scale-95 transition-all">СОХРАНИТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Твой ключ интегрирован
        const API_KEY = 'AIzaSyAkWRYL9_tpgC60nMQvM8mQQD81MIIwG2k';
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let contests = JSON.parse(localStorage.getItem('hunter_final_v2') || '[]');
        let archiveMode = false;

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('in-date').valueAsDate = new Date();
            document.getElementById('in-time').value = '18:00';
            document.getElementById('status-text').innerText = 'Ожидание данных...';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('status-text').innerText = 'Система готова';
        }

        async function analyzeImage(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('ai-loading-indicator').classList.remove('hidden');
            document.getElementById('status-text').innerText = 'АИ читает скриншот... 👁️';
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                
                const prompt = "Ты профессиональный анализатор розыгрышей. Извлеки данные из скриншота Telegram. Верни ТОЛЬКО JSON: { 'channel': 'имя канала', 'prize': 'название приза', 'date': 'ГГГГ-ММ-ДД', 'time': 'ЧЧ:ММ', 'winners': число, 'users': число_участников }. Если участников не видно, пиши 100. Если дата сегодня, пиши " + new Date().toISOString().split('T')[0];

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: base64 } }] }]
                        })
                    });

                    const res = await response.json();
                    const text = res.candidates[0].content.parts[0].text;
                    const json = JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());

                    if(json.channel) document.getElementById('in-name').value = json.channel;
                    if(json.prize) document.getElementById('in-prize').value = json.prize;
                    if(json.date) document.getElementById('in-date').value = json.date;
                    if(json.time) document.getElementById('in-time').value = json.time;
                    if(json.winners) document.getElementById('in-winners').value = json.winners;
                    if(json.users) document.getElementById('in-users').value = json.users;

                    document.getElementById('status-text').innerText = 'АИ: Данные считаны!';
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } catch (err) {
                    console.error(err);
                    document.getElementById('status-text').innerText = 'АИ: Ошибка сканирования';
                } finally {
                    document.getElementById('ai-loading-indicator').classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        function save() {
            const name = document.getElementById('in-name').value;
            const prize = document.getElementById('in-prize').value;
            const date = document.getElementById('in-date').value;
            const time = document.getElementById('in-time').value;
            const winners = parseInt(document.getElementById('in-winners').value) || 1;
            const users = parseInt(document.getElementById('in-users').value) || 0;

            if(!name || !prize) return;

            contests.push({
                id: Date.now(), name, prize, date, time, winners, users,
                done: false, ts: new Date(`${date}T${time}`).getTime()
            });

            localStorage.setItem('hunter_final_v2', JSON.stringify(contests));
            closeModal();
            render();
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function toggleStatus(id) {
            const idx = contests.findIndex(x => x.id === id);
            contests[idx].done = !contests[idx].done;
            localStorage.setItem('hunter_final_v2', JSON.stringify(contests));
            render();
        }

        function toggleArchive() { archiveMode = !archiveMode; render(); }

        function render() {
            const container = document.getElementById('contest-container');
            container.innerHTML = '';
            const list = contests.filter(c => c.done === archiveMode);
            const now = Date.now();

            const active = contests.filter(c => !c.done);
            const burning = active.filter(c => Math.abs(c.ts - now) < 3600000).length;
            document.getElementById('burning-count').innerText = burning;

            let totalCh = 0;
            active.forEach(c => { if(c.users > 0) totalCh += (c.winners / c.users); });
            document.getElementById('avg-chance').innerText = active.length > 0 ? (totalCh * 100).toFixed(1) + '%' : '0%';

            list.sort((a,b) => a.ts - b.ts).forEach(item => {
                const diff = item.ts - now;
                const isHot = !item.done && diff > 0 && diff < 3600000;
                const chance = item.users > 0 ? ((item.winners / item.users) * 100).toFixed(1) : '?';
                
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-[2.5rem] flex justify-between items-center transition-all ${isHot ? 'hot-glow' : ''} ${item.done ? 'opacity-30' : ''}`;
                card.innerHTML = `
                    <div class="flex-1" onclick="toggleStatus(${item.id})">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-[8px] font-black bg-white/10 text-slate-400 px-3 py-1 rounded-full uppercase tracking-tighter text-center">
                                ${new Date(item.date).toLocaleDateString('ru-RU', {day:'numeric', month:'short'})} | ${item.time}
                            </span>
                            ${isHot ? '<span class="text-[8px] font-black text-red-500 animate-pulse italic">СКОРО 🔥</span>' : ''}
                        </div>
                        <h3 class="text-white font-black text-lg tracking-tight leading-tight">${item.name}</h3>
                        <p class="text-blue-500 font-bold text-[10px] uppercase tracking-wide mt-1">🎁 ${item.prize} • <span class="text-slate-500 italic">шанс ${chance}%</span></p>
                    </div>
                    <button onclick="if(confirm('Удалить?')){contests=contests.filter(x=>x.id!==${item.id});localStorage.setItem('hunter_final_v2',JSON.stringify(contests));render();}" class="text-slate-800 text-2xl ml-4">&times;</button>
                `;
                container.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
