<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hunter AI Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid rgba(255,255,255,0.05); }
        input { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; border-radius: 1rem !important; }
        .shimmer { background: linear-gradient(90deg, #1e293b 25%, #3b82f6 50%, #1e293b 75%); background-size: 200% 100%; animation: move 1.5s infinite; }
        @keyframes move { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black italic text-white uppercase tracking-tighter">Hunter<span class="text-blue-500">.AI</span></h1>
            <div class="flex gap-2">
                <button onclick="toggleArchive()" id="archive-btn" class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl text-[10px] font-bold text-slate-400">АРХИВ</button>
            </div>
        </header>
        <div id="contest-container" class="space-y-4"></div>
    </div>

    <div class="fixed bottom-8 left-0 right-0 px-8 flex flex-col gap-2">
        <div id="debug-info" class="text-[8px] text-center text-slate-600 font-mono hidden uppercase"></div>
        <button onclick="openModal()" class="w-full bg-blue-600 py-5 rounded-[2.2rem] shadow-2xl shadow-blue-900/40 font-black text-white text-lg active:scale-95 transition-all">＋ ДОБАВИТЬ ЛОТ</button>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/98 hidden z-[100] items-center justify-center p-6 backdrop-blur-xl">
        <div class="bg-slate-900 w-full max-w-sm p-8 rounded-[3rem] border border-white/10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-white uppercase italic">Настройка</h2>
                <label class="bg-orange-500 px-5 py-2.5 rounded-2xl text-[10px] font-black text-white cursor-pointer active:scale-90 transition-all flex items-center gap-2">
                    СКАН 📸
                    <input type="file" id="file-picker" accept="image/*" class="hidden" onchange="analyzeImage(this)">
                </label>
            </div>
            
            <div id="loader" class="hidden w-full h-1.5 rounded-full shimmer mb-6"></div>

            <div class="space-y-4">
                <input type="text" id="in-name" placeholder="Название канала" class="w-full p-4 outline-none font-bold">
                <input type="text" id="in-prize" placeholder="Приз" class="w-full p-4 outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input type="date" id="in-date" class="p-4 text-xs outline-none w-full">
                    <input type="time" id="in-time" class="p-4 text-xs outline-none w-full">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <label class="absolute -top-2 left-3 bg-slate-900 px-1 text-[7px] text-slate-500 font-bold uppercase">Побед</label>
                        <input type="number" id="in-winners" value="1" class="p-4 text-xs outline-none w-full">
                    </div>
                    <div class="relative">
                        <label class="absolute -top-2 left-3 bg-slate-900 px-1 text-[7px] text-slate-500 font-bold uppercase">Участников</label>
                        <input type="number" id="in-users" placeholder="100" class="p-4 text-xs outline-none w-full">
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal()" class="flex-1 font-bold text-slate-500 uppercase text-xs">Назад</button>
                    <button onclick="save()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg shadow-blue-900/20">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAkWRYL9_tpgC60nMQvM8mQQD81MIIwG2k';
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let contests = JSON.parse(localStorage.getItem('h_v6_db') || '[]');
        let archiveMode = false;

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('in-date').valueAsDate = new Date();
            document.getElementById('in-time').value = '18:00';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function analyzeImage(input) {
            const file = input.files[0];
            if (!file) return;

            const loader = document.getElementById('loader');
            const debug = document.getElementById('debug-info');
            loader.classList.remove('hidden');
            debug.classList.remove('hidden');
            debug.innerText = 'Загрузка...';

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                
                const prompt = "Act as TG Parser. Find: 1.Channel Name, 2.Prize, 3.Winners count, 4.Participants count, 5.Date/Time. Return JSON ONLY: {\"n\":\"Name\",\"p\":\"Prize\",\"w\":1,\"u\":100,\"d\":\"YYYY-MM-DD\",\"t\":\"HH:MM\"}";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: base64 } }] }]
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                    const res = await response.json();
                    let raw = res.candidates[0].content.parts[0].text;
                    let clean = raw.match(/\{.*\}/s)[0];
                    const data = JSON.parse(clean);

                    document.getElementById('in-name').value = data.n || '';
                    document.getElementById('in-prize').value = data.p || '';
                    document.getElementById('in-winners').value = data.w || 1;
                    document.getElementById('in-users').value = data.u || 0;
                    if(data.d) document.getElementById('in-date').value = data.d;
                    if(data.t) document.getElementById('in-time').value = data.t;

                    debug.innerText = 'Успешно прочитано';
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } catch (err) {
                    console.error(err);
                    debug.innerText = 'Ошибка: ' + err.message;
                    tg.showAlert('ИИ не ответил. Попробуй VPN или другой скриншот.');
                } finally {
                    loader.classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        function save() {
            const n = document.getElementById('in-name').value;
            const p = document.getElementById('in-prize').value;
            const d = document.getElementById('in-date').value;
            const t = document.getElementById('in-time').value;
            if(!n || !p) return;
            
            contests.push({
                id: Date.now(), name: n, prize: p, date: d, time: t,
                winners: parseInt(document.getElementById('in-winners').value) || 1,
                users: parseInt(document.getElementById('in-users').value) || 1,
                done: false, ts: new Date(`${d}T${t}`).getTime()
            });
            localStorage.setItem('h_v6_db', JSON.stringify(contests));
            closeModal();
            render();
        }

        function toggleStatus(id) {
            const i = contests.findIndex(x => x.id === id);
            contests[i].done = !contests[i].done;
            localStorage.setItem('h_v6_db', JSON.stringify(contests));
            render();
        }

        function toggleArchive() {
            archiveMode = !archiveMode;
            document.getElementById('archive-btn').innerText = archiveMode ? 'АКТИВНЫЕ' : 'АРХИВ';
            render();
        }

        function render() {
            const container = document.getElementById('contest-container');
            container.innerHTML = '';
            const list = contests.filter(c => c.done === archiveMode);
            list.sort((a,b) => a.ts - b.ts).forEach(item => {
                const chance = item.users > 0 ? ((item.winners / item.users) * 100).toFixed(1) : '0.0';
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-[2.5rem] flex justify-between items-center ${item.done ? 'opacity-30 scale-95' : 'active:scale-95'} transition-all`;
                card.innerHTML = `
                    <div class="flex-1" onclick="toggleStatus(${item.id})">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[8px] font-black text-blue-400 uppercase tracking-tighter">${item.date} | ${item.time}</span>
                        </div>
                        <h3 class="text-white font-black text-xl leading-tight uppercase tracking-tight">${item.name}</h3>
                        <p class="text-slate-400 font-bold text-[10px] mt-1">🎁 ${item.prize} • ШАНС <span class="text-green-500">${chance}%</span></p>
                    </div>
                    <button onclick="if(confirm('Удалить?')){contests=contests.filter(x=>x.id!==${item.id});localStorage.setItem('h_v6_db',JSON.stringify(contests));render();}" class="text-slate-800 text-3xl px-2">&times;</button>
                `;
                container.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
